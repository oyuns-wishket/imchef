<!doctype html><html><head><meta charset="utf-8"><title>부드럽게 먹는♥돼지고기장조림 - 만개의레시피</title></head><body><h1>부드럽게 먹는♥돼지고기장조림</h1><script type="application/ld+json">{"@context": "http://schema.org/", "@type": "Recipe", "name": "부드럽게 먹는♥돼지고기장조림", "image": ["https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/cd667bfc961f3399910a156150de59471_f.jpg", "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/cd667bfc961f3399910a156150de59471.jpg"], "author": {"@type": "Person", "name": "만개의레시피"}, "datePublished": "2018-05-29T12:43:55+09:00", "description": "항상 질기거나 뻑뻑한 장조림만드셨다면 이렇게 조리해서 드셔보세요 : )  세상의 모든 레시피 만개의레시피 ", "aggregateRating": {"@type": "AggregateRating", "ratingValue": "5", "reviewCount": "9"}, "totalTime": "PT30M", "recipeYield": "4 servings", "recipeIngredient": ["돼지고기안심 400g", "메추리알 1팩", "청양고추 2개", "통마늘 10개", "통후추 1/4숟가락", "소주 1/3종이컵", "간장 1/2종이컵", "설탕 2숟가락", "맛술 3숟가락"], "recipeInstructions": [{"@type": "HowToStep", "text": "돼지 안심은 큼직하게 썰어 찬물에 담가 약 30분 정도 핏물을 뺀다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/216a65b7d47caa5886ea29dd1223b33e1.png"}, {"@type": "HowToStep", "text": "냄비에 고기를 넣고 고기가 잠길 만큼의 물을 붓고 소주를 부어 한소끔 끓인다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/7a595f55d686c7efec3b6aa9f54c14101.png"}, {"@type": "HowToStep", "text": "한소끔 끓인 고기는 찬물에 한번 헹구어 낸다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/570510f237b6a1987c3ae73f536cb3451.png"}, {"@type": "HowToStep", "text": "다시 냄비에 고기를 넣고 고기가 잠길 정도의 물을 붓고 통후추, 통마늘을 넣어 고기가 익을 때까지 푹 끓인다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/29e6205908ec69f61b6d72e8ab8d9d001.png"}, {"@type": "HowToStep", "text": "익은 고기는 건져내어 결대로 찢는다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/4b6d171b024741b583f2c13903a5bde11.png"}, {"@type": "HowToStep", "text": "고기 끓인 물에 건더기는 건져내고 찢은 고기, 메추리알, 청양고추를 넣고 양념 재료를 넣어 한소끔 끓여 완성한다.", "image": "https://recipe1.ezmember.co.kr/cache/recipe/2018/05/29/cc09ab89466af83dc50baa0e808b43a71.png"}]}</script></body></html>
